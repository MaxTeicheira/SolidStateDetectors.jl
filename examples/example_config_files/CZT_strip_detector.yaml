name: CZT Strip Detector (CTSI)

# CZT planar strip detector: 40mm x 40mm x 5mm
# 39 anode strips on top face (z=+2.5mm), running along Y, 1mm pitch, 100um wide
# 8 cathode strips on bottom face (z=-2.5mm), running along X, 5mm pitch, 4.9mm wide
# Bias: 600V total (anodes at +600V, cathodes at 0V) => 1200 V/cm

units:
  length: mm
  angle: deg
  potential: V
  temperature: K

grid:
  coordinates: cartesian
  axes:
    x:
      from: -22
      to: 22
      boundaries: inf
    y:
      from: -22
      to: 22
      boundaries: inf
    z:
      from: -4
      to: 7
      boundaries: inf

medium: vacuum

detectors:
  - semiconductor:
      material: CZT
      temperature: 293
      impurity_density:
        name: constant
        value: 0
      charge_drift_model:
        model: IsotropicChargeDriftModel
        mobilities:
          e: 1000cm^2/(V*s)
          h: 50cm^2/(V*s)
      charge_trapping_model:
        model: ConstantLifetime
        parameters:
          τe: 10e-6s
          τh: 1e-6s
      geometry:
        box:
          widths: [40, 40, 5]

    contacts:
      # ============================================================
      # Anode strips (IDs 1-39): top face z=+2.5mm
      # Each strip: 100um wide (hX=0.05mm), runs full length in Y (hY=20mm)
      # Surface contact on top face (hZ=0)
      # Strip centers at x = -19, -18, ..., 0, ..., +19 mm (1mm pitch)
      # ============================================================

      # Anode 1: x = -19mm
      - material: CZT
        id: 1
        name: Anode 1
        potential: 600
        geometry:
          box:
            hX: 0.05
            hY: 20
            hZ: 0
            origin:
              x: -19
              z: 2.5

      # Anode 2: x = -18mm
      - material: CZT
        id: 2
